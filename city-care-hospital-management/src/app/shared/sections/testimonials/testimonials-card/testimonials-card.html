<div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 
            p-6 flex flex-col h-full border border-gray-100 
            group overflow-hidden relative">

    <!-- Quote Icon -->
    <div class="absolute top-3 right-4 text-primary/10 text-6xl select-none font-serif">
        "
    </div>

    <!-- Stars Rating -->
    <div class="flex gap-1 mb-4">
        <span class="text-yellow-400 text-sm">★★★★★</span>
    </div>

    <!-- Message -->
    <div class="relative z-10 flex-grow">
        <p class="text-gray-600 text-sm leading-relaxed line-clamp-4">
            "{{ testimonialCardData.message }}"
        </p>
    </div>

    <!-- Divider -->
    <div class="h-px bg-gray-100 my-4"></div>

    <!-- Patient Info -->
    <div class="flex items-center gap-3">
        <div class="shrink-0">
            <img [src]="testimonialCardData.image" [alt]="testimonialCardData.name" 
                 class="w-12 h-12 rounded-full object-cover ring-2 ring-gray-100">
        </div>
        <div class="text-left">
            <h4 class="font-semibold text-sm text-gray-800">
                {{ testimonialCardData.name }}
            </h4>
            <span class="text-xs text-gray-400">Verified Patient</span>
        </div>
    </div>
</div>
