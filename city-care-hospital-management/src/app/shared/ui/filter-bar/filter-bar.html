<div class="bg-white rounded-xl shadow-md border border-gray-200 p-4 mb-4">
  <div class="flex flex-wrap items-center gap-4">
    <!-- Filter Label -->
    <div class="flex items-center gap-2 text-gray-700 font-medium">
      <i class="fas fa-filter text-primary text-lg"></i>
      <span class="text-base">Filters:</span>
    </div>

    <!-- Search Input -->
    @if(showSearch){
    <div class="relative">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" [(ngModel)]="searchValue" (input)="onSearchChange()" placeholder="Search..."
        class="pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary min-w-[200px]" />
    </div>
    }

    <!-- Category/Department Filter -->
    @if(showCategory && categoryOptions.length > 0){
    <select [(ngModel)]="categoryValue" (change)="onCategoryChange()"
      class="px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary min-w-[160px]">
      @for(option of categoryOptions; track option.value){
      <option [value]="option.value">{{option.label}}</option>
      }
    </select>
    }

    <!-- Sort Filter -->
    @if(showSort && sortOptions.length > 0){
    <select [(ngModel)]="sortValue" (change)="onSortChange()"
      class="px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary min-w-[150px]">
      @for(option of sortOptions; track option.value){
      <option [value]="option.value">{{option.label}}</option>
      }
    </select>
    }

    <!-- Clear Button -->
    <button (click)="clearFilters()"
      class="ml-auto px-4 py-2 text-sm text-gray-500 hover:text-primary transition-colors flex items-center gap-2">
      <i class="fas fa-times"></i>
      Clear
    </button>
  </div>
</div>
