<div class="relative w-full h-full overflow-hidden">
  <!-- Images -->
  <div class="relative w-full h-full">
    @for (image of images; track $index; let index = $index) {
      <div 
        class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
        [class.opacity-0]="index !== currentImageIndex"
        [class.opacity-100]="index === currentImageIndex">
        <img 
          [src]="image.url" 
          [alt]="image.alt"
          class="w-full h-full object-cover"
          style="height: calc(100vh - 64px); min-height: 550px;"
          loading="eager">
      </div>
    }
  </div>

  <!-- Overlay gradient -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/60 to-black/80"></div>
  
  <!-- Navigation dots -->
  <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex space-x-2 z-20">
    @for (image of images; track $index; let index = $index) {
      <button
        (click)="goToImage(index)"
        class="w-3 h-3 rounded-full transition-all duration-300"
        [class.bg-white.bg-opacity-50]="index !== currentImageIndex"
        [class.bg-white.bg-opacity-100]="index === currentImageIndex"
        [class.w-8]="index === currentImageIndex"
        [attr.aria-label]="'Go to slide ' + (index + 1)">
        <span class="sr-only">Slide {{ index + 1 }}</span>
      </button>
    }
  </div>

  <!-- Navigation arrows -->
  <button
    (click)="previousImage()"
    class="absolute left-4 top-1/2 transform -translate-y-1/2 bg-white/20 hover:bg-white/30 text-white p-3 rounded-full transition-all duration-300 z-20"
    aria-label="Previous image">
    <i class="fas fa-chevron-left"></i>
  </button>
  
  <button
    (click)="nextImage()"
    class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-white/20 hover:bg-white/30 text-white p-3 rounded-full transition-all duration-300 z-20"
    aria-label="Next image">
    <i class="fas fa-chevron-right"></i>
  </button>

  <!-- Optional: Image title overlay -->
  <div class="absolute bottom-20 left-1/2 transform -translate-x-1/2 text-center z-10">
    <h3 class="text-white text-xl font-light drop-shadow-lg">
      {{ currentImage.title }}
    </h3>
  </div>
</div>
