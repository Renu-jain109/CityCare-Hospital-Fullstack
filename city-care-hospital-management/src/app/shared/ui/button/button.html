<button
[type]="type"
(click)="onClick()"
[disabled]="disabled"
[ngClass]="{
  'btn' : true,
  'btn-primary': color === 'primary',
  'btn-secondary': color === 'secondary',
  'btn-danger': color === 'danger',
  'btn-outline': color === 'outline', 
  'btn-light-blue': color === 'light-blue',
} " [class]="customClass">
@if(icon){
  <i [class]="icon"></i>
}
  {{ label }}

</button>
