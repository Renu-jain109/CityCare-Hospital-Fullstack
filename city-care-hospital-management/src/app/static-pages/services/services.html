<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 lg:py-20">
  <div class="text-center mb-12">
    <app-heading title="Our Services" subtitle="Comprehensive healthcare solutions tailored for you and your family." size="main" sizeSm="main" sizeMd="main" sizeLg="main" sizeXl="main" align="center"></app-heading>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let s of servicesData">
      <app-card [cardData]="{
        title: s.title,
        titleClass: 'text-xl font-bold text-gray-800 mb-2',
        showIconCircle: true,
        bgColor: 'bg-white shadow-md border',
        iconBgColor: 'bg-blue-100',
        iconClass: s.icon,
        iconColor: 'text-primary',
        description: s.text,
        descriptionClass: 'text-gray-600',
        hoverClass: 'hover:-translate-y-2 transition-transform duration-300'
      }"></app-card>
    </div>
  </div>
</section>
