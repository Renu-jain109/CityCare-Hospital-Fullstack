@if(doctor){
<div class="max-w-5xl mx-auto px-4 py-8">


    <!-- Doctor Info Card -->
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-gradient-to-r from-blue-500 to-blue-600 p-6 text-white">
            <div class="flex items-center space-x-4">
                <div class="bg-white rounded-full p-4">
                    <i [class]="doctor.icon || 'fas fa-user-md'" class="text-3xl text-blue-500"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold">{{ doctor.doctorName }}</h1>
                    <p class="text-blue-100 text-lg">{{ doctor.departmentName }}</p>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Experience -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-gray-700 mb-2">Experience</h3>
                    <p class="text-gray-600">{{ doctor.experience }} years</p>
                </div>

                <!-- Qualification -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-gray-700 mb-2">Qualification</h3>
                    <p class="text-gray-600">{{ doctor.qualification }}</p>
                </div>

                <!-- Availability -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-gray-700 mb-2">Availability</h3>
                    <p class="text-gray-600">{{ doctor.availability }}</p>
                </div>

                <!-- Consultation Fee -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-gray-700 mb-2">Consultation Fee</h3>
                    <p class="text-gray-600">₹{{ doctor.consultationFee }}</p>
                </div>
            </div>

            <!-- Status -->
            <div class="mt-6">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"
                    [class]="doctor.status === 'Active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                    {{ doctor.status }}
                </span>
            </div>
        </div>
    </div>

</div>

<div *ngIf="!doctor" class="text-center py-10">
    <p class="text-gray-500 text-lg">Doctor not found.</p>
</div>

<!-- Action Buttons -->
<div class="mt-6 text-center flex justify-center gap-4 mb-12">
    <app-button color="primary" label="Go to Home" icon="fas fa-arrow-right" customClass="rounded-xl inline-flex"
        (click)="goToHome()"></app-button>
    <app-button color="primary" label="Book Appointment" icon="fas fa-calendar" customClass="rounded-xl inline-flex"
        (click)="goToBookAppointment()"></app-button>
</div>

}
