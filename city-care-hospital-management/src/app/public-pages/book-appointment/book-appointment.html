<section class="bg-gradient-to-b from-blue-50 to-white min-h-screen py-4 px-4">
  <div class="max-w-3xl mx-auto">
    <!-- Header Card -->
    <app-card className="mb-4">
      <div class="text-center py-4">
        <app-heading 
          title="Book an Appointment"
          subtitle="Fill in your details and choose a suitable time slot. Our team will confirm your appointment shortly."
          size="md" 
          align="center">
        </app-heading>
      </div>
    </app-card>

    <!-- Form Card -->
    <app-card className="shadow-lg">
      <div class="p-4">
        <app-dynamic-form
          [fields]="appintmentFields"
          [form]="appointmentForm"
          [buttons]="buttons"
          (submitForm)="onSubmit()">
        </app-dynamic-form>

        <!-- No Doctors Available Message -->
        @if(noDoctorsMessage) {
          <div class="mt-4 p-4 bg-orange-50 border border-orange-200 rounded-lg">
            <div class="flex items-start gap-3">
              <i class="fa-solid fa-circle-exclamation text-orange-500 mt-1"></i>
              <div>
                <p class="text-orange-800 font-medium">{{ noDoctorsMessage }}</p>
                <p class="text-orange-600 text-sm mt-1">Please choose another department or contact hospital directly.</p>
              </div>
            </div>
          </div>
        }
      </div>
    </app-card>

    <!-- Home Button -->
    <div class="flex justify-center mt-4">
      <app-button 
        color="outline" 
        label="Go to Home" 
        icon="fas fa-arrow-right" 
        customClass="rounded-lg"
        (click)="goHome()">
      </app-button>
    </div>
  </div>
</section>
