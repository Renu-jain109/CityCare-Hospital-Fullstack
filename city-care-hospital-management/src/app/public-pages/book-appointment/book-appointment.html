<section class="bg-blue-100 relative overflow-hidden max-w-6xl mx-auto py-6 px-4 mt-2 rounded-lg">

  <div class=" text-center ">
    <app-heading title="Book an Appointment"
      subtitle="Fill in your details and choose a suitable time slot. Our team will confirm your appointment shortly."
      size="md" sizeSm="lg" sizeLg="xl" sizeXl="xl" align="center"></app-heading>

  </div>

  <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow mt-6">

    <app-dynamic-form [fields]="appintmentFields" [form]="appointmentForm" [buttons]="buttons"
      (submitForm)="onSubmit()">
    </app-dynamic-form>

  </div>

  <div class="flex justify-center mb-2 mt-4">
  <app-button color="outline" label="Go to Home" icon="fas fa-arrow-right" customClass="rounded-xl inline-flex"
    (click)="goHome()">
  </app-button>
</div>
</section>
