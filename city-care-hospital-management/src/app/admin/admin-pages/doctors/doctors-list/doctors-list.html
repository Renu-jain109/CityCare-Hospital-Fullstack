<div class="flex justify-between items-center mb-2">

  <app-heading

    title="Doctors List"

    size="main" sizeSm="main" sizeMd="main" sizeLg="main" sizeXl="main"

  ></app-heading>



  <div class="flex items-center gap-3">

    <!-- Search Bar -->

    <div class="relative">

      <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>

      <input

        type="text"

        placeholder="Search doctors..."

        [value]="searchTerm"

        (input)="onSearch($event)"

        class="pl-10 pr-10 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent w-64"

      />

      @if(searchTerm) {

        <button

          (click)="clearSearch()"

          class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"

        >

          <i class="fa-solid fa-times"></i>

        </button>

      }

    </div>



    <app-button

      label="Add Doctor"

      color="primary"

      icon="fa-solid fa-plus"

      customClass="rounded-xl"

      (click)="addDoctors()"

    >

    </app-button>

  </div>

</div>



<app-table

  [columns]="doctorColumns"

  [data]="filteredDoctorData"

  [showActions]="true"

  [actions]="doctorActions"

  [showPagination]="true"

  [pageSize]="8"

  [currentPage]="currentPage"

  (actionClick)="handleTableAction($event)"

  (pageChange)="onPageChange($event)"

  >

</app-table>



@if(filteredDoctorData.length === 0 && searchTerm) {

  <div class="text-center py-8 text-gray-500">

    <i class="fa-solid fa-search text-3xl mb-2"></i>

    <p>No doctors found matching "{{ searchTerm }}"</p>

  </div>

}
