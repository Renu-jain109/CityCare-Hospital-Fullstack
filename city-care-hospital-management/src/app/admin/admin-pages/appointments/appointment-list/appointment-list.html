<div class="appointment-list-container">
    <app-heading title="Appointment List" size="main" sizeSm="main" sizeMd="main" sizeLg="main" sizeXl="main"></app-heading>

  <div class="">
    <!-- Search Bar -->
    <div class="relative mb-4">
      <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
        <input 
            type="text" 
            class="w-full border border-none outline-none " 
            placeholder="Search appointments..." 
            [(ngModel)]="searchTerm"
            (input)="onSearch($event)"
            class="pl-10 pr-10 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent w-64"

        />
              @if(searchTerm) {
        <button
          (click)="clearSearch()"
          class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
        >
          <i class="fa-solid fa-times"></i>
        </button>
      }

    </div>
    <app-table 
    [columns]="appointmentColumns" 
    [data]="filteredAppointmentData" 
    [showActions]="true"
    [actions]="appointmentActions" 
    [showPagination]="true"
    [pageSize]="8"
    [currentPage]="currentPage"
    (actionClick)="handleTableAction($event)"
    (pageChange)="onPageChange($event)"></app-table>
</div>
