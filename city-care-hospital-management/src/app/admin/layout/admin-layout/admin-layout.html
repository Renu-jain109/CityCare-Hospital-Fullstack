<div class="flex bg-gray-100 min-h-screen overflow-hidden">

    <!-- Sidebar - Fixed position -->
    <app-admin-sidebar class="fixed inset-y-0 left-0 z-40 transform md:translate-x-0 transition-transform duration-300" [class.-translate-x-full]="!sidebarOpen" (close)="closeSidebar()"></app-admin-sidebar>


 <!-- Overlay (Click here to close) -->

 @if(sidebarOpen){
  <div
    class="fixed inset-0 bg-black/30 z-30 md:hidden"
    (click)="closeSidebar()"
  ></div>
 }

    <!-- Main Content - With margin for fixed sidebar -->
    <div class="flex-1 flex flex-col overflow-hidden md:ml-72 lg:ml-80" >

        <!-- Header -->

        <app-admin-navbar class="shrink-0" (menuClick)="toggleSidebar()"></app-admin-navbar>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto p-6">
            <router-outlet></router-outlet>
        </main>

    </div>

</div>
